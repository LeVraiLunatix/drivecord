name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'capacitor.config.json'
      - 'ios/**'
      - 'resources/**'
      - 'CHANGELOG.md'
      - '.github/workflows/ios-build.yml'

permissions:
  contents: write   # needed to create GitHub Releases

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── App icon ─────────────────────────────────────────────────────────────
      - name: Generate icon (if no custom icon provided)
        run: |
          if [ ! -f resources/icon.png ]; then
            echo "No custom icon found — generating default Drivecord icon..."
            python3 scripts/generate-icon.py
          else
            echo "Custom icon found at resources/icon.png ✅"
          fi
          ls -la resources/

      - name: Generate all iOS icon sizes
        run: npx @capacitor/assets generate --ios --iconBackgroundColor "#0a0a0a" --iconBackgroundColorDark "#0a0a0a"

      # ── Capacitor sync ────────────────────────────────────────────────────────
      - name: Sync Capacitor
        run: npx cap sync ios

      # ── Build ─────────────────────────────────────────────────────────────────
      - name: Install ldid
        run: brew install ldid

      - name: Build app (unsigned)
        run: |
          # Auto-incrementing version so AltStore detects each new build.
          # MUST match the source.json version → set MARKETING_VERSION here too.
          VERSION="1.0.${{ github.run_number }}"
          echo "app_version=$VERSION" >> $GITHUB_ENV
          echo "Building version $VERSION"
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            SKIP_INSTALL=NO \
            MARKETING_VERSION="$VERSION" \
            CURRENT_PROJECT_VERSION="${{ github.run_number }}" \
            -derivedDataPath "$GITHUB_WORKSPACE/DerivedData" \
            build 2>&1 | grep -E "error:|Build succeeded|FAILED|warning:.*error" | tail -20

      - name: Locate .app
        id: app
        run: |
          APP=$(find "$GITHUB_WORKSPACE/DerivedData" -name "*.app" \
            -not -path "*/simulator/*" \
            -not -name "*.appex" | head -1)
          echo "path=$APP" >> $GITHUB_OUTPUT
          echo "Found: $APP"

      - name: Sign with ldid
        run: |
          APP="${{ steps.app.outputs.path }}"
          BINARY="$APP/$(basename "$APP" .app)"
          cat > /tmp/ent.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>application-identifier</key><string>com.lunatix.drivecord</string>
            <key>get-task-allow</key><true/>
          </dict></plist>
          EOF
          ldid -S/tmp/ent.plist "$BINARY"
          echo "Signed ✅"

      - name: Package IPA
        run: |
          APP="${{ steps.app.outputs.path }}"
          mkdir Payload
          cp -r "$APP" Payload/
          zip -r Drivecord.ipa Payload/
          IPA_SIZE=$(stat -f%z Drivecord.ipa)
          echo "IPA size: $(du -sh Drivecord.ipa)"
          echo "ipa_size=$IPA_SIZE" >> $GITHUB_ENV

      # ── Update source.json in the PUBLIC repo (version + changelog) ──────────
      # The AltStore source lives at drivecord-releases/source.json.
      # Version = MARKETING_VERSION (must match), so AltStore offers the update.
      # Release notes = the top section of CHANGELOG.md (French).
      - name: Update public source.json
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: |
          SIZE=$(stat -f%z Drivecord.ipa)
          DATE=$(date +%Y-%m-%d)
          VERSION="${{ env.app_version }}"
          git clone "https://x-access-token:${GIST_TOKEN}@github.com/LeVraiLunatix/drivecord-releases.git" /tmp/rel
          CHANGELOG_PATH="$GITHUB_WORKSPACE/CHANGELOG.md" \
          VERSION="$VERSION" SIZE="$SIZE" DATE="$DATE" \
          python3 - <<'PYEOF'
          import json, os, re

          # Extract the top changelog entry (first "## " heading + body).
          notes = "Nouvelle version de Drivecord."
          try:
              with open(os.environ['CHANGELOG_PATH'], encoding='utf-8') as f:
                  text = f.read()
              # Drop HTML comments.
              text = re.sub(r'<!--.*?-->', '', text, flags=re.S)
              m = re.search(r'^##\s+(.*?)(?=^##\s|\Z)', text, flags=re.S | re.M)
              if m:
                  notes = m.group(0).lstrip('#').strip()
          except Exception as e:
              print("changelog read failed:", e)

          with open('/tmp/rel/source.json', encoding='utf-8') as f:
              src = json.load(f)
          ver = {
              'version': os.environ['VERSION'],
              'date': os.environ['DATE'],
              'downloadURL': 'https://github.com/LeVraiLunatix/drivecord-releases/releases/download/ios-latest/Drivecord.ipa',
              'size': int(os.environ['SIZE']),
              'localizedDescription': notes,
          }
          # Prepend as newest; keep a short history (max 10).
          versions = [v for v in src['apps'][0].get('versions', []) if v.get('version') != ver['version']]
          src['apps'][0]['versions'] = [ver] + versions[:9]
          with open('/tmp/rel/source.json', 'w', encoding='utf-8') as f:
              json.dump(src, f, indent=2, ensure_ascii=False)
          print("Set version", ver['version'])
          print(notes[:200])
          PYEOF
          cd /tmp/rel
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add source.json
          git diff --staged --quiet || git commit -m "release: ${{ env.app_version }}"
          git push || true

      # ── GitHub Release dans le repo PUBLIC drivecord-releases ────────────────
      # Le repo privé ne permet pas le téléchargement sans auth.
      # GIST_TOKEN doit avoir le scope public_repo.
      - name: Create/Update public Release
        uses: softprops/action-gh-release@v2
        with:
          repository: LeVraiLunatix/drivecord-releases
          token: ${{ secrets.GIST_TOKEN }}
          tag_name: ios-latest
          name: "Drivecord ${{ env.app_version }}"
          prerelease: false
          make_latest: true
          files: Drivecord.ipa
          body: |
            ### Drivecord ${{ env.app_version }}

            **Source AltStore :**
            ```
            https://raw.githubusercontent.com/LeVraiLunatix/drivecord-releases/main/source.json
            ```

      # ── Artifact (backup) ─────────────────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Drivecord-IPA
          path: Drivecord.ipa
          retention-days: 30

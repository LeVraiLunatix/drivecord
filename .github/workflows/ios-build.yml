name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'capacitor.config.json'
      - 'ios/**'
      - 'resources/**'
      - '.github/workflows/ios-build.yml'

permissions:
  contents: write   # needed to create GitHub Releases

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── App icon ─────────────────────────────────────────────────────────────
      - name: Generate icon (if no custom icon provided)
        run: |
          if [ ! -f resources/icon.png ]; then
            echo "No custom icon found — generating default Drivecord icon..."
            python3 scripts/generate-icon.py
          else
            echo "Custom icon found at resources/icon.png ✅"
          fi
          ls -la resources/

      - name: Generate all iOS icon sizes
        run: npx @capacitor/assets generate --ios --iconBackgroundColor "#0a0a0a" --iconBackgroundColorDark "#0a0a0a"

      # ── Capacitor sync ────────────────────────────────────────────────────────
      - name: Sync Capacitor
        run: npx cap sync ios

      # ── Build ─────────────────────────────────────────────────────────────────
      - name: Install ldid
        run: brew install ldid

      - name: Build app (unsigned)
        run: |
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            SKIP_INSTALL=NO \
            -derivedDataPath "$GITHUB_WORKSPACE/DerivedData" \
            build 2>&1 | grep -E "error:|Build succeeded|FAILED|warning:.*error" | tail -20

      - name: Locate .app
        id: app
        run: |
          APP=$(find "$GITHUB_WORKSPACE/DerivedData" -name "*.app" \
            -not -path "*/simulator/*" \
            -not -name "*.appex" | head -1)
          echo "path=$APP" >> $GITHUB_OUTPUT
          echo "Found: $APP"

      - name: Sign with ldid
        run: |
          APP="${{ steps.app.outputs.path }}"
          BINARY="$APP/$(basename "$APP" .app)"
          cat > /tmp/ent.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>application-identifier</key><string>com.lunatix.drivecord</string>
            <key>get-task-allow</key><true/>
          </dict></plist>
          EOF
          ldid -S/tmp/ent.plist "$BINARY"
          echo "Signed ✅"

      - name: Package IPA
        run: |
          APP="${{ steps.app.outputs.path }}"
          mkdir Payload
          cp -r "$APP" Payload/
          zip -r Drivecord.ipa Payload/
          IPA_SIZE=$(stat -f%z Drivecord.ipa)
          echo "IPA size: $(du -sh Drivecord.ipa)"
          echo "ipa_size=$IPA_SIZE" >> $GITHUB_ENV

      # ── Update AltStore source version ────────────────────────────────────────
      - name: Update altstore-source.json
        run: |
          DATE=$(date +%Y-%m-%d)
          BUILD=${{ github.run_number }}
          VERSION="1.0.$BUILD"
          SIZE=${{ env.ipa_size }}
          # Update version in source JSON
          python3 -c "
          import json, sys
          with open('altstore-source.json') as f:
            src = json.load(f)
          src['apps'][0]['versions'] = [{
            'version': '$VERSION',
            'date': '$DATE',
            'downloadURL': 'https://github.com/LeVraiLunatix/discloud/releases/download/ios-latest/Drivecord.ipa',
            'size': $SIZE,
            'localizedDescription': 'Build automatique #$BUILD'
          }]
          with open('altstore-source.json', 'w') as f:
            json.dump(src, f, indent=2, ensure_ascii=False)
          print('Updated altstore-source.json to v$VERSION')
          "
          cat altstore-source.json

      - name: Commit updated source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add altstore-source.json
          git diff --staged --quiet || git commit -m "chore: update AltStore source to build ${{ github.run_number }}"
          git push

      # ── GitHub Release (public download URL for AltStore) ─────────────────────
      - name: Create/Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ios-latest
          name: "Drivecord iOS — Build ${{ github.run_number }}"
          prerelease: true
          files: Drivecord.ipa
          body: |
            ### Drivecord iOS — Build ${{ github.run_number }}

            **Installer via AltStore :**
            Ajoute la source : `https://raw.githubusercontent.com/LeVraiLunatix/discloud/master/altstore-source.json`

            Ou télécharge directement `Drivecord.ipa` ci-dessous.

      # ── Artifact (backup) ─────────────────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Drivecord-IPA
          path: Drivecord.ipa
          retention-days: 30

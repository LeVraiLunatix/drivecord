name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'capacitor.config.json'
      - 'ios/**'
      - 'resources/**'
      - '.github/workflows/ios-build.yml'

permissions:
  contents: write   # needed to create GitHub Releases

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── App icon ─────────────────────────────────────────────────────────────
      - name: Generate icon (if no custom icon provided)
        run: |
          if [ ! -f resources/icon.png ]; then
            echo "No custom icon found — generating default Drivecord icon..."
            python3 scripts/generate-icon.py
          else
            echo "Custom icon found at resources/icon.png ✅"
          fi
          ls -la resources/

      - name: Generate all iOS icon sizes
        run: npx @capacitor/assets generate --ios --iconBackgroundColor "#0a0a0a" --iconBackgroundColorDark "#0a0a0a"

      # ── Capacitor sync ────────────────────────────────────────────────────────
      - name: Sync Capacitor
        run: npx cap sync ios

      # ── Build ─────────────────────────────────────────────────────────────────
      - name: Install ldid
        run: brew install ldid

      - name: Build app (unsigned)
        run: |
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            SKIP_INSTALL=NO \
            -derivedDataPath "$GITHUB_WORKSPACE/DerivedData" \
            build 2>&1 | grep -E "error:|Build succeeded|FAILED|warning:.*error" | tail -20

      - name: Locate .app
        id: app
        run: |
          APP=$(find "$GITHUB_WORKSPACE/DerivedData" -name "*.app" \
            -not -path "*/simulator/*" \
            -not -name "*.appex" | head -1)
          echo "path=$APP" >> $GITHUB_OUTPUT
          echo "Found: $APP"

      - name: Sign with ldid
        run: |
          APP="${{ steps.app.outputs.path }}"
          BINARY="$APP/$(basename "$APP" .app)"
          cat > /tmp/ent.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>application-identifier</key><string>com.lunatix.drivecord</string>
            <key>get-task-allow</key><true/>
          </dict></plist>
          EOF
          ldid -S/tmp/ent.plist "$BINARY"
          echo "Signed ✅"

      - name: Package IPA
        run: |
          APP="${{ steps.app.outputs.path }}"
          mkdir Payload
          cp -r "$APP" Payload/
          zip -r Drivecord.ipa Payload/
          IPA_SIZE=$(stat -f%z Drivecord.ipa)
          echo "IPA size: $(du -sh Drivecord.ipa)"
          echo "ipa_size=$IPA_SIZE" >> $GITHUB_ENV

      # ── Update source.json in the PUBLIC repo (size + date) ──────────────────
      # The AltStore source lives at drivecord-releases/source.json.
      # Version stays "1.0" (must match CFBundleShortVersionString).
      - name: Update public source.json
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: |
          SIZE=$(stat -f%z Drivecord.ipa)
          DATE=$(date +%Y-%m-%d)
          git clone "https://x-access-token:${GIST_TOKEN}@github.com/LeVraiLunatix/drivecord-releases.git" /tmp/rel
          python3 - <<PYEOF
          import json
          with open('/tmp/rel/source.json', encoding='ascii') as f:
              src = json.load(f)
          src['apps'][0]['versions'][0]['size'] = ${SIZE}
          src['apps'][0]['versions'][0]['date'] = '${DATE}'
          with open('/tmp/rel/source.json', 'w', encoding='ascii') as f:
              json.dump(src, f, indent=2, ensure_ascii=True)
          PYEOF
          cd /tmp/rel
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add source.json
          git diff --staged --quiet || git commit -m "chore: update source size/date (build ${{ github.run_number }})"
          git push || true

      # ── GitHub Release dans le repo PUBLIC drivecord-releases ────────────────
      # Le repo privé ne permet pas le téléchargement sans auth.
      # GIST_TOKEN doit avoir le scope public_repo.
      - name: Create/Update public Release
        uses: softprops/action-gh-release@v2
        with:
          repository: LeVraiLunatix/drivecord-releases
          token: ${{ secrets.GIST_TOKEN }}
          tag_name: ios-latest
          name: "Drivecord iOS — Build ${{ github.run_number }}"
          prerelease: false
          make_latest: true
          files: Drivecord.ipa
          body: |
            ### Drivecord iOS — Build ${{ github.run_number }}

            **Source AltStore :**
            ```
            https://gist.githubusercontent.com/LeVraiLunatix/675fae65b1a5de3c86eb9b82c511e83b/raw/gistfile1.txt
            ```

      # ── Artifact (backup) ─────────────────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Drivecord-IPA
          path: Drivecord.ipa
          retention-days: 30

name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'capacitor.config.json'
      - 'ios/**'
      - '.github/workflows/ios-build.yml'

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Regenerate files excluded by ios/.gitignore
      - name: Sync Capacitor
        run: npx cap sync ios

      # ldid creates a minimal fake signature that AltStore can replace
      - name: Install ldid
        run: brew install ldid

      # Build for device (no real signing needed — ldid handles it after)
      - name: Build app
        run: |
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            SKIP_INSTALL=NO \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES \
            -derivedDataPath "$GITHUB_WORKSPACE/DerivedData" \
            build 2>&1 | grep -E "error:|warning:|Build succeeded|FAILED" | tail -30

      # Find the built .app
      - name: Locate .app
        id: app
        run: |
          APP=$(find "$GITHUB_WORKSPACE/DerivedData" -name "*.app" \
            -not -path "*/simulator/*" \
            -not -name "*.appex" \
            | head -1)
          echo "path=$APP" >> $GITHUB_OUTPUT
          echo "Found: $APP"
          ls "$APP"

      # Sign with ldid (fake signature — AltStore replaces it with user's Apple ID)
      - name: Sign with ldid
        run: |
          APP="${{ steps.app.outputs.path }}"
          # Create minimal entitlements
          cat > /tmp/entitlements.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>application-identifier</key>
            <string>com.lunatix.drivecord</string>
            <key>get-task-allow</key>
            <true/>
          </dict>
          </plist>
          EOF
          # Sign main binary
          BINARY="$APP/$(basename "$APP" .app)"
          echo "Signing: $BINARY"
          ldid -S/tmp/entitlements.plist "$BINARY"
          echo "Done"

      # Package as IPA
      - name: Package IPA
        run: |
          APP="${{ steps.app.outputs.path }}"
          mkdir Payload
          cp -r "$APP" Payload/
          zip -r Drivecord.ipa Payload/
          echo "IPA size: $(du -sh Drivecord.ipa)"
          # Verify structure
          unzip -l Drivecord.ipa | grep -E "\.app/|Info\.plist|binary" | head -20

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Drivecord-IPA
          path: Drivecord.ipa
          retention-days: 30

      - name: Summary
        if: success()
        run: |
          echo "## ✅ Drivecord.ipa prête" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Installer avec AltStore 2.0" >> $GITHUB_STEP_SUMMARY
          echo "1. Télécharge l'artifact **Drivecord-IPA**" >> $GITHUB_STEP_SUMMARY
          echo "2. Transfère \`Drivecord.ipa\` sur iPhone (AirDrop, Fichiers...)" >> $GITHUB_STEP_SUMMARY
          echo "3. AltStore → **My Apps** → **+** → sélectionne le .ipa" >> $GITHUB_STEP_SUMMARY

name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'capacitor.config.json'
      - '.github/workflows/ios-build.yml'

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── Verify Capacitor config ───────────────────────────────────────────────
      - name: Show Capacitor config
        run: |
          cat capacitor.config.json
          echo "---"
          ls node_modules/@capacitor/ || echo "No @capacitor in node_modules"

      # ── Add iOS platform ──────────────────────────────────────────────────────
      - name: Add iOS platform
        run: |
          npx cap add ios
          echo "Exit code: $?"
          echo "--- ios/ structure ---"
          find ios -maxdepth 4 -type f | sort || echo "No ios/ directory created"

      # ── CocoaPods ─────────────────────────────────────────────────────────────
      - name: pod install
        run: |
          PODFILE=$(find ios -name "Podfile" | head -1)
          if [ -z "$PODFILE" ]; then
            echo "ERROR: No Podfile found. cap add ios probably failed."
            find . -maxdepth 3 -name "*.json" | grep -i cap || true
            exit 1
          fi
          PODFILE_DIR=$(dirname "$PODFILE")
          echo "Running pod install in: $PODFILE_DIR"
          cd "$PODFILE_DIR"
          pod install

      # ── Sync ─────────────────────────────────────────────────────────────────
      - name: Sync web assets
        run: npx cap sync ios

      # ── Build ─────────────────────────────────────────────────────────────────
      - name: Build archive (unsigned)
        run: |
          WS=$(find ios -name "*.xcworkspace" -maxdepth 5 | head -1)
          echo "Using workspace: $WS"
          xcodebuild \
            -workspace "$WS" \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            -archivePath "$GITHUB_WORKSPACE/build/Drivecord.xcarchive" \
            archive 2>&1 | tail -60

      - name: Package IPA
        run: |
          APP=$(find "$GITHUB_WORKSPACE/build/Drivecord.xcarchive/Products/Applications" -name "*.app" | head -1)
          echo "App bundle: $APP"
          mkdir Payload
          cp -r "$APP" Payload/
          zip -r Drivecord.ipa Payload/
          echo "IPA size: $(du -sh Drivecord.ipa)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Drivecord-IPA
          path: Drivecord.ipa
          retention-days: 30

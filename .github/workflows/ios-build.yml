name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'capacitor.config.json'
      - 'ios/**'
      - '.github/workflows/ios-build.yml'

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Regenerate files excluded by ios/.gitignore (public/, capacitor.config.json, config.xml)
      - name: Sync web assets
        run: npx cap sync ios

      # Verify project structure
      - name: Verify iOS project
        run: |
          echo "--- Project structure ---"
          ls ios/App/
          echo "--- Checking key files ---"
          ls ios/App/App.xcodeproj/
          ls ios/App/App/

      # Build unsigned IPA (Swift Package Manager — no CocoaPods needed)
      - name: Build archive
        run: |
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            -archivePath "$GITHUB_WORKSPACE/build/Drivecord.xcarchive" \
            archive 2>&1 | tail -80

      - name: Package IPA
        run: |
          APP=$(find "$GITHUB_WORKSPACE/build/Drivecord.xcarchive/Products/Applications" -name "*.app" | head -1)
          echo "App bundle: $APP"
          mkdir Payload
          cp -r "$APP" Payload/
          zip -r Drivecord.ipa Payload/
          echo "IPA size: $(du -sh Drivecord.ipa)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Drivecord-IPA
          path: Drivecord.ipa
          retention-days: 30

      - name: Summary
        if: success()
        run: |
          echo "## ✅ Drivecord.ipa prête" >> $GITHUB_STEP_SUMMARY
          echo "Télécharge l'artifact **Drivecord-IPA** et installe avec AltStore." >> $GITHUB_STEP_SUMMARY

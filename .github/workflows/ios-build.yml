name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'capacitor.config.ts'
      - '.github/workflows/ios-build.yml'

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── Capacitor ─────────────────────────────────────────────────────────────
      - name: Add iOS platform
        run: npx cap add ios
        env:
          CI: true

      - name: Debug — list ios/App
        run: ls -la ios/App/ || echo "ios/App not found"

      - name: Copy web assets
        run: npx cap sync ios

      # ── CocoaPods ─────────────────────────────────────────────────────────────
      - name: Install CocoaPods dependencies
        run: |
          PODFILE_DIR=$(find ios -name "Podfile" -maxdepth 3 | head -1 | xargs dirname)
          echo "Podfile found in: $PODFILE_DIR"
          cd "$PODFILE_DIR"
          pod install --repo-update

      # ── Build ─────────────────────────────────────────────────────────────────
      - name: Find workspace
        id: workspace
        run: |
          WS=$(find ios -name "*.xcworkspace" -maxdepth 4 | head -1)
          DIR=$(dirname "$WS")
          echo "workspace=$WS" >> $GITHUB_OUTPUT
          echo "dir=$DIR" >> $GITHUB_OUTPUT
          echo "Found workspace: $WS"

      - name: Build archive (unsigned)
        run: |
          xcodebuild \
            -workspace "${{ steps.workspace.outputs.workspace }}" \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            -archivePath "$GITHUB_WORKSPACE/build/Drivecord.xcarchive" \
            archive 2>&1 | tail -50

      - name: Package IPA
        run: |
          APP=$(find "$GITHUB_WORKSPACE/build/Drivecord.xcarchive/Products/Applications" -name "*.app" | head -1)
          echo "App: $APP"
          mkdir -p Payload
          cp -r "$APP" Payload/
          zip -r Drivecord.ipa Payload/
          echo "IPA: $(du -sh Drivecord.ipa)"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Drivecord-IPA
          path: Drivecord.ipa
          retention-days: 30
